<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Command Center</title>
  <meta name="description" content="Personal accountability dashboard">
  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CmdCenter">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%2309090b'/><text x='90' y='115' text-anchor='middle' font-family='system-ui' font-size='96' font-weight='800' fill='%233b82f6'>C</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090b;
      --surface: #18181b;
      --border: #27272a;
      --border-hover: #3f3f46;
      --accent: #3b82f6;
      --career: #22c55e;
      --faith: #a78bfa;
      --fitness: #f59e0b;
      --personal: #64748b;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-dim: #52525b;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-pill: 20px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 1rem 2rem; }
    @media (min-width: 1024px) { .container { padding: 0 1.5rem 3rem; } }

    .section-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 0.75rem;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem;
      transition: border-color 200ms ease;
    }
    .card:hover { border-color: var(--border-hover); }
    @media (min-width: 1024px) { .card { padding: 1.25rem; } }

    .section { margin-bottom: 1.25rem; }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(9,9,11,0.85); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
    }
    @media (min-width: 1024px) { .header { padding: 0.75rem 1.5rem; } }
    .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .header-title {
      font-size: 1.1rem; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @media (min-width: 768px) { .header-title { font-size: 1.5rem; } }
    .header-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .pill {
      display: inline-flex; align-items: center; padding: 0.2rem 0.6rem;
      border-radius: var(--radius-pill); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.5px;
    }
    .pill-sprint { background: rgba(59,130,246,0.15); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
    .pill-day { background: rgba(250,250,250,0.06); color: var(--text-secondary); font-weight: 500; }
    .pill-deadline { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.25); }

    /* Affirmation */
    .affirmation-card {
      background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(167,139,250,0.08));
      border: 1px solid rgba(167,139,250,0.15);
      border-radius: var(--radius); padding: 1.25rem;
    }
    .affirmation-text { font-style: italic; font-size: 0.95rem; color: var(--text); line-height: 1.6; }
    .affirmation-ref { font-size: 0.75rem; color: var(--faith); margin-top: 0.5rem; font-weight: 600; }

    /* Progress rings */
    .progress-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    @media (min-width: 768px) { .progress-grid { grid-template-columns: repeat(4, 1fr); } }
    .ring-card { display: flex; flex-direction: column; align-items: center; padding: 1rem; }
    .ring-svg { width: 80px; height: 80px; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
    .ring-fg { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 800ms ease; }
    .ring-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-top: 0.5rem; text-align: center; }
    .ring-value {
      font-size: 0.8rem; font-weight: 700; fill: var(--text);
      transform: rotate(90deg); transform-origin: center;
    }

    /* Goal cards */
    .goals-grid { display: grid; gap: 0.75rem; }
    @media (min-width: 768px) { .goals-grid { grid-template-columns: repeat(3, 1fr); } }
    .goal-card { border-left: 3px solid; }
    .goal-card[data-cat="career"] { border-left-color: var(--career); }
    .goal-card[data-cat="faith"] { border-left-color: var(--faith); }
    .goal-card[data-cat="fitness"] { border-left-color: var(--fitness); }
    .goal-cat { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.35rem; }
    .goal-cat[data-cat="career"] { color: var(--career); }
    .goal-cat[data-cat="faith"] { color: var(--faith); }
    .goal-cat[data-cat="fitness"] { color: var(--fitness); }
    .goal-daily { font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
    .goal-cascade { overflow: hidden; transition: max-height 300ms ease; }
    .goal-cascade.collapsed { max-height: 0; }
    .goal-cascade-item { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.35rem; }
    .goal-cascade-item strong { color: var(--text-dim); font-weight: 600; font-size: 0.65rem; text-transform: uppercase; }
    .goal-toggle {
      font-size: 0.65rem; color: var(--text-dim); cursor: pointer; margin-top: 0.5rem;
      background: none; border: none; padding: 0; font-family: inherit;
    }
    .goal-toggle:hover { color: var(--text-secondary); }

    /* Schedule */
    .schedule-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0.75rem; border-radius: var(--radius-sm);
      cursor: pointer; transition: all 200ms ease; user-select: none;
      -webkit-user-select: none; min-height: 44px;
    }
    .schedule-item:active { transform: scale(0.98); }
    .schedule-item:hover { background: rgba(255,255,255,0.03); }
    .schedule-item.done { opacity: 0.45; }
    .schedule-time { font-size: 0.7rem; color: var(--text-dim); font-weight: 600; min-width: 70px; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .schedule-activity { flex: 1; font-size: 0.8rem; font-weight: 400; }
    .schedule-item.done .schedule-activity { text-decoration: line-through; }
    .schedule-check { font-size: 0.75rem; opacity: 0; transition: opacity 200ms; }
    .schedule-item.done .schedule-check { opacity: 1; color: var(--success); }
    .cat-pill {
      font-size: 0.55rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 0.15rem 0.45rem; border-radius: var(--radius-pill); white-space: nowrap;
    }
    .cat-pill[data-cat="career"] { background: rgba(34,197,94,0.12); color: var(--career); }
    .cat-pill[data-cat="faith"] { background: rgba(167,139,250,0.12); color: var(--faith); }
    .cat-pill[data-cat="fitness"] { background: rgba(245,158,11,0.12); color: var(--fitness); }
    .cat-pill[data-cat="personal"] { background: rgba(100,116,139,0.12); color: var(--personal); }

    /* Tasks */
    .task-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .task-counter { font-size: 0.8rem; font-weight: 700; }
    .task-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 0.75rem; border-radius: var(--radius-sm);
      cursor: pointer; transition: all 200ms ease; user-select: none;
      -webkit-user-select: none; min-height: 48px;
    }
    .task-item:active { transform: scale(0.98); }
    .task-item:hover { background: rgba(255,255,255,0.03); }
    .task-checkbox {
      width: 22px; height: 22px; min-width: 22px; border-radius: 5px;
      border: 2px solid var(--border-hover); display: flex; align-items: center;
      justify-content: center; transition: all 200ms ease; font-size: 0.7rem;
    }
    .task-item.done .task-checkbox {
      background: var(--success); border-color: var(--success); color: #fff;
    }
    .task-name { flex: 1; font-size: 0.85rem; font-weight: 400; transition: all 200ms ease; }
    .task-item.done .task-name { text-decoration: line-through; opacity: 0.45; }
    .task-meta { display: flex; gap: 0.35rem; align-items: center; }
    .priority-dot { width: 6px; height: 6px; border-radius: 50%; }
    .priority-dot.high { background: var(--error); }
    .priority-dot.medium { background: var(--warning); }
    .priority-dot.low { background: var(--text-dim); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }

    /* Milestones */
    .milestone-item {
      display: flex; gap: 0.75rem; padding: 0.75rem; border-radius: var(--radius-sm);
      border-left: 3px solid var(--border);
    }
    .milestone-item.current { border-left-color: var(--warning); background: rgba(245,158,11,0.04); }
    .milestone-item + .milestone-item { margin-top: 0.5rem; }
    .milestone-week { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); min-width: 28px; }
    .milestone-body { flex: 1; }
    .milestone-theme { font-size: 0.85rem; font-weight: 600; }
    .milestone-dates { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.1rem; }
    .milestone-kpis { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .status-badge {
      font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 0.15rem 0.45rem; border-radius: var(--radius-pill);
    }
    .status-badge.current { background: rgba(245,158,11,0.15); color: var(--warning); }
    .status-badge.upcoming { background: rgba(239,68,68,0.1); color: var(--text-dim); }
    .status-badge.done { background: rgba(34,197,94,0.12); color: var(--success); }

    /* Isaiah grid */
    .isaiah-grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 3px; }
    @media (max-width: 480px) { .isaiah-grid { grid-template-columns: repeat(8, 1fr); } }
    .isaiah-ch {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; font-weight: 600; border-radius: 4px;
      background: rgba(255,255,255,0.03); color: var(--text-dim);
    }
    .isaiah-ch.completed { background: rgba(167,139,250,0.25); color: var(--faith); }
    .isaiah-ch.today { border: 1.5px solid var(--faith); color: var(--faith); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* Gym split */
    .gym-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; }
    .gym-day {
      text-align: center; padding: 0.6rem 0.25rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .gym-day.today { border-color: var(--accent); box-shadow: 0 0 12px rgba(59,130,246,0.2); }
    .gym-day.rest { background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.2); }
    .gym-day-label { font-size: 0.6rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }
    .gym-day-split { font-size: 0.75rem; font-weight: 700; margin-top: 0.2rem; }

    /* Daily log */
    .log-entry { padding: 0.75rem; border-radius: var(--radius-sm); background: rgba(255,255,255,0.02); }
    .log-entry + .log-entry { margin-top: 0.5rem; }
    .log-date { font-size: 0.7rem; font-weight: 700; color: var(--accent); }
    .log-summary { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .log-meta { font-size: 0.65rem; color: var(--text-dim); margin-top: 0.25rem; }

    /* Footer */
    .footer { text-align: center; padding: 2rem 0 1rem; font-size: 0.65rem; color: var(--text-dim); }

    /* Checkbox bounce */
    @keyframes checkBounce { 0% { transform: scale(1); } 30% { transform: scale(0.92); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }
    .bounce { animation: checkBounce 300ms ease; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <span class="header-title">COMMAND CENTER</span>
      <div class="header-meta" id="headerMeta"></div>
    </div>
  </header>

  <main class="container" id="app">
    <p style="color:var(--text-dim);text-align:center;padding:3rem 0;">Loading dashboard...</p>
  </main>

  <script>
    // --- Service Worker Registration ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // --- Helpers ---
    const $ = (s, p = document) => p.querySelector(s);
    const $$ = (s, p = document) => [...p.querySelectorAll(s)];
    const catColor = (c) => ({ career: '#22c55e', faith: '#a78bfa', fitness: '#f59e0b', personal: '#64748b' }[c] || '#64748b');

    function lsKey(prefix, date, idx) { return `cmd_${prefix}_${date}_${idx}`; }
    function lsGet(key) { try { return localStorage.getItem(key); } catch { return null; } }
    function lsSet(key, val) { try { localStorage.setItem(key, val); } catch {} }

    function daysBetween(a, b) {
      const d1 = new Date(a + 'T00:00:00');
      const d2 = new Date(b + 'T00:00:00');
      return Math.floor((d2 - d1) / 86400000);
    }

    function progressRing(pct, color, label, display) {
      const r = 34, c = 2 * Math.PI * r;
      const offset = c - (Math.min(pct, 100) / 100) * c;
      return `<div class="card ring-card">
        <svg class="ring-svg" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="${r}"/>
          <circle class="ring-fg" cx="40" cy="40" r="${r}" stroke="${color}"
            stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
          <text class="ring-value" x="40" y="44" text-anchor="middle">${display}</text>
        </svg>
        <div class="ring-label">${label}</div>
      </div>`;
    }

    // --- Render ---
    async function init() {
      let data;
      try {
        const res = await fetch(`data.json?t=${Date.now()}`);
        data = await res.json();
      } catch {
        $('#app').innerHTML = '<p style="color:var(--error);text-align:center;padding:3rem;">Failed to load data.json</p>';
        return;
      }

      const d = data;
      const today = d.current_day.date;
      const sprintDay = daysBetween(d.sprint_start_date, today) + 1;
      const ycDays = daysBetween(today, d.yc_deadline);

      // Header
      $('#headerMeta').innerHTML = `
        <span class="pill pill-sprint">36-DAY SPRINT</span>
        <span class="pill pill-day">Day ${sprintDay} of 36</span>
        <span class="pill pill-deadline">YC: May 4 (${ycDays}d)</span>
        <span class="pill pill-day">${d.current_day.day_name}, ${today}</span>
      `;

      // Affirmation
      const affIdx = (sprintDay - 1) % d.affirmations.length;
      const affirmation = d.affirmations[affIdx];

      // Progress
      const p = d.progress;
      const sprintPct = Math.round((sprintDay / 36) * 100);

      let html = '';

      // 1. Affirmation
      html += `<section class="section">
        <div class="affirmation-card">
          <div class="affirmation-text">"${affirmation}"</div>
          <div class="affirmation-ref">Day ${sprintDay} Affirmation</div>
        </div>
      </section>`;

      // 2. Progress rings
      html += `<section class="section">
        <div class="section-label">Sprint Progress</div>
        <div class="progress-grid">
          ${progressRing(sprintPct, '#3b82f6', 'Sprint', `${sprintPct}%`)}
          ${progressRing((p.gym_this_week / p.gym_week_target) * 100, '#f59e0b', 'Gym / Week', `${p.gym_this_week}/${p.gym_week_target}`)}
          ${progressRing((p.isaiah_completed / p.isaiah_total) * 100, '#a78bfa', 'Isaiah', `${p.isaiah_completed}/${p.isaiah_total}`)}
          ${progressRing((p.videos_analyzed / p.videos_target) * 100, '#22c55e', 'Videos', `${p.videos_analyzed}/${p.videos_target}`)}
        </div>
      </section>`;

      // 3. Goal cards
      html += `<section class="section">
        <div class="section-label">Today's Goals</div>
        <div class="goals-grid">`;
      for (const [cat, goals] of Object.entries(d.goals)) {
        const isMobile = window.innerWidth < 1024;
        html += `<div class="card goal-card" data-cat="${cat}">
          <div class="goal-cat" data-cat="${cat}">${cat}</div>
          <div class="goal-daily">${goals.daily}</div>
          <div class="goal-cascade ${isMobile ? 'collapsed' : ''}" id="cascade-${cat}">
            <div class="goal-cascade-item"><strong>Quarterly</strong><br>${goals.quarterly}</div>
            <div class="goal-cascade-item"><strong>Monthly</strong><br>${goals.monthly}</div>
            <div class="goal-cascade-item"><strong>Weekly</strong><br>${goals.weekly}</div>
          </div>
          <button class="goal-toggle" onclick="toggleCascade('${cat}')">${isMobile ? 'Show goals cascade ▾' : 'Hide cascade ▴'}</button>
        </div>`;
      }
      html += `</div></section>`;

      // 4. Schedule
      html += `<section class="section">
        <div class="section-label">Today's Schedule</div>
        <div class="card" style="padding:0.25rem 0;">`;
      d.schedule.forEach((s, i) => {
        const key = lsKey('sched', today, i);
        const isDone = lsGet(key) === 'done';
        html += `<div class="schedule-item ${isDone ? 'done' : ''}" data-sched-idx="${i}" onclick="toggleSchedule(this, ${i}, '${today}')">
          <span class="schedule-time">${s.time}</span>
          <span class="schedule-activity">${s.activity}</span>
          <span class="cat-pill" data-cat="${s.category}">${s.category}</span>
          <span class="schedule-check">✓</span>
        </div>`;
      });
      html += `</div></section>`;

      // 5. Tasks
      const taskStates = d.tasks.map((t, i) => {
        const key = lsKey('tasks', today, i);
        const stored = lsGet(key);
        return stored || t.status;
      });
      const doneCount = taskStates.filter(s => s === 'done').length;
      const totalTasks = d.tasks.length;
      const counterColor = doneCount === 0 ? '#ef4444' : doneCount === totalTasks ? '#22c55e' : '#f59e0b';

      html += `<section class="section">
        <div class="section-label">
          <div class="task-header">
            <span>Today's Tasks</span>
            <span class="task-counter" id="taskCounter" style="color:${counterColor}">${doneCount}/${totalTasks} Done</span>
          </div>
        </div>
        <div class="card" style="padding:0.25rem 0;" id="taskList">`;

      // Sort: incomplete first
      const indices = d.tasks.map((_, i) => i);
      indices.sort((a, b) => {
        const aD = taskStates[a] === 'done' ? 1 : 0;
        const bD = taskStates[b] === 'done' ? 1 : 0;
        return aD - bD;
      });

      indices.forEach(i => {
        const t = d.tasks[i];
        const isDone = taskStates[i] === 'done';
        html += `<div class="task-item ${isDone ? 'done' : ''}" data-task-idx="${i}" onclick="toggleTask(this, ${i}, '${today}')">
          <div class="task-checkbox">${isDone ? '✓' : ''}</div>
          <span class="task-name">${t.name}</span>
          <div class="task-meta">
            <span class="cat-pill" data-cat="${t.category}">${t.category}</span>
            <span class="priority-dot ${t.priority}"></span>
          </div>
        </div>`;
      });
      html += `</div></section>`;

      // 6. Milestones
      html += `<section class="section">
        <div class="section-label">Sprint Milestones</div>
        <div class="card" style="padding:0.5rem;">`;
      d.milestones.forEach(m => {
        html += `<div class="milestone-item ${m.status}">
          <div class="milestone-week">W${m.week}</div>
          <div class="milestone-body">
            <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
              <span class="milestone-theme">${m.theme}</span>
              <span class="status-badge ${m.status}">${m.status}</span>
            </div>
            <div class="milestone-dates">${m.dates}</div>
            <div class="milestone-kpis">${m.kpis}</div>
          </div>
        </div>`;
      });
      html += `</div></section>`;

      // 7. Isaiah
      const completed = new Set(d.isaiah_chapters.completed);
      const todayCh = d.isaiah_chapters.today;
      html += `<section class="section">
        <div class="section-label">Isaiah Reading Progress</div>
        <div class="card">
          <div class="isaiah-grid">`;
      for (let ch = 1; ch <= 66; ch++) {
        const cls = completed.has(ch) ? 'completed' : ch === todayCh ? 'today' : '';
        html += `<div class="isaiah-ch ${cls}">${ch}</div>`;
      }
      html += `</div></div></section>`;

      // 8. Gym split
      html += `<section class="section">
        <div class="section-label">Gym Split</div>
        <div class="card">
          <div class="gym-grid">`;
      d.gym_week.forEach(g => {
        const cls = [g.is_today ? 'today' : '', g.is_rest ? 'rest' : ''].join(' ');
        html += `<div class="gym-day ${cls}">
          <div class="gym-day-label">${g.day}</div>
          <div class="gym-day-split" style="color:${g.is_rest ? 'var(--warning)' : 'var(--text)'}">${g.split}</div>
        </div>`;
      });
      html += `</div></div></section>`;

      // 9. Daily Log
      html += `<section class="section">
        <div class="section-label">Daily Log</div>
        <div class="card" style="padding:0.5rem;">`;
      const logs = [...d.daily_log].reverse().slice(0, 7);
      logs.forEach(l => {
        html += `<div class="log-entry">
          <div class="log-date">Day ${l.sprint_day} — ${l.day_name}, ${l.date}</div>
          <div class="log-summary">${l.summary}</div>
          <div class="log-meta">${l.bible} · ${l.tasks_completed.length} tasks done${l.notes ? ' · ' + l.notes : ''}</div>
        </div>`;
      });
      html += `</div></section>`;

      // Footer
      const updatedDate = new Date(d.last_updated);
      html += `<footer class="footer">Last updated: ${updatedDate.toLocaleString()}</footer>`;

      $('#app').innerHTML = html;
    }

    // --- Interactive handlers ---
    function toggleTask(el, idx, date) {
      const key = lsKey('tasks', date, idx);
      const isDone = el.classList.contains('done');
      const newState = isDone ? 'not_started' : 'done';
      lsSet(key, newState);

      el.classList.toggle('done');
      const cb = el.querySelector('.task-checkbox');
      cb.textContent = isDone ? '' : '✓';
      cb.classList.add('bounce');
      setTimeout(() => cb.classList.remove('bounce'), 300);

      // Update counter
      const allItems = $$('.task-item');
      const done = allItems.filter(i => i.classList.contains('done')).length;
      const total = allItems.length;
      const counter = $('#taskCounter');
      if (counter) {
        counter.textContent = `${done}/${total} Done`;
        counter.style.color = done === 0 ? '#ef4444' : done === total ? '#22c55e' : '#f59e0b';
      }
    }

    function toggleSchedule(el, idx, date) {
      const key = lsKey('sched', date, idx);
      const isDone = el.classList.contains('done');
      lsSet(key, isDone ? 'not_started' : 'done');
      el.classList.toggle('done');
    }

    function toggleCascade(cat) {
      const el = document.getElementById(`cascade-${cat}`);
      const btn = el.nextElementSibling;
      el.classList.toggle('collapsed');
      btn.textContent = el.classList.contains('collapsed') ? 'Show goals cascade ▾' : 'Hide cascade ▴';
    }

    // --- Boot ---
    init();
  </script>
</body>
</html>
